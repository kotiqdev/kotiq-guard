# Deploy — the pushed branch selects the GitHub Environment (develop → dev, main → prod).
# Auth is keyless via OIDC (Workload Identity Federation); no stored keys.
# Each environment's Variables/Secrets live under Settings → Environments.
# Pushing to a branch whose environment isn't configured yet will fail at the auth step (expected).
name: Deploy

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  id-token: write # required: lets the job mint an OIDC token for Workload Identity Federation

env:
  SERVICE: kotiq-guard

jobs:
  deploy:
    # Branch selects the environment; each carries its own config.
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPO }}/kotiq-guard:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        # ^##^ custom delimiter so commas inside list vars don't split the env-var list.
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ secrets.REGION }} \
            --service-account ${{ secrets.RUNTIME_SA }} \
            --allow-unauthenticated \
            --max-instances 2 \
            --set-env-vars "^##^LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}##LLM_MAX_OUTPUT_TOKENS=${{ secrets.LLM_MAX_OUTPUT_TOKENS }}##LLM_THINKING_BUDGET=${{ secrets.LLM_THINKING_BUDGET }}##AUTH_ENABLED=true##GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}##GOOGLE_CLOUD_LOCATION=${{ secrets.REGION }}##GOOGLE_OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}##ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}##ALLOWED_DOMAINS=${{ secrets.ALLOWED_DOMAINS }}##USERS_STORE=${{ secrets.USERS_STORE }}##LANGCHAIN_CALLBACKS_BACKGROUND=false##LANGSMITH_TRACING=${{ secrets.LANGSMITH_TRACING }}##LANGSMITH_ENDPOINT=${{ secrets.LANGSMITH_ENDPOINT }}##LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }}##LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}"
