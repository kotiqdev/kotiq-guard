# Deploy — the pushed branch selects the GitHub Environment (develop → dev, main → prod).
# Auth is keyless via OIDC (Workload Identity Federation); no stored keys.
# Dormant until the environment's WIF_PROVIDER variable is set (job skipped otherwise).
# Configure each environment's Variables/Secrets under Settings → Environments.
name: Deploy

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  id-token: write # required: lets the job mint an OIDC token for Workload Identity Federation

env:
  REGION: europe-west1
  SERVICE: kotiq-guard

jobs:
  deploy:
    # Branch selects the environment; each carries its own config.
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    if: ${{ vars.WIF_PROVIDER != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/kotiq-guard:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        # ^##^ custom delimiter so commas inside list vars don't split the env-var list.
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --service-account ${{ vars.RUNTIME_SA }} \
            --allow-unauthenticated \
            --max-instances 2 \
            --set-env-vars "^##^LLM_PROVIDER=vertex##AUTH_ENABLED=true##GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }}##GOOGLE_CLOUD_LOCATION=${{ env.REGION }}##GOOGLE_OAUTH_CLIENT_ID=${{ vars.OAUTH_CLIENT_ID }}##ALLOWED_EMAILS=${{ vars.ALLOWED_EMAILS }}##ALLOWED_DOMAINS=${{ vars.ALLOWED_DOMAINS }}##USERS_STORE=${{ vars.USERS_STORE }}##LANGSMITH_TRACING=${{ vars.LANGSMITH_TRACING }}##LANGSMITH_PROJECT=${{ vars.LANGSMITH_PROJECT }}##LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}"

      - name: Show URL
        run: gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format='value(status.url)'
